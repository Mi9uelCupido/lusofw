name: Build lusofw

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        firmware:
          - Heltec_t114_repeater
          - Heltec_t114_repeater_bridge_rs232
          - Heltec_t114_without_display_repeater
          - Heltec_t114_without_display_repeater_bridge_rs232
          - RAK_4631_repeater
          - RAK_4631_repeater_bridge_rs232_serial1
          - RAK_4631_repeater_bridge_rs232_serial2
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Init Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ matrix.firmware }}

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        shell: bash
        run: pip install --upgrade platformio

      - name: Extract versions
        run: |
          FIRMWARE_VERSION=$(grep '^[[:space:]]*#define[[:space:]]\+FIRMWARE_VERSION[[:space:]]\+"' examples/companion_radio/MyMesh.h | \
            sed -E 's/^[[:space:]]*#define[[:space:]]+FIRMWARE_VERSION[[:space:]]+"v([0-9.]+)".*/v\1/')
          LUSOFW_FIRMWARE_VERSION=$(grep '^[[:space:]]*#define[[:space:]]\+LUSOFW_FIRMWARE_VERSION[[:space:]]\+"' examples/simple_repeater/MyMesh.h | \
            sed -E 's/^[[:space:]]*#define[[:space:]]+LUSOFW_FIRMWARE_VERSION[[:space:]]+"([^"]+)".*/\1/')
          echo "FIRMWARE_VERSION=${FIRMWARE_VERSION}" >> "$GITHUB_ENV"
          echo "LUSOFW_FIRMWARE_VERSION=${LUSOFW_FIRMWARE_VERSION}" >> "$GITHUB_ENV"

      - name: Build Firmware
        env:
          FIRMWARE_VERSION: ${{ env.FIRMWARE_VERSION }}
          LUSOFW_FIRMWARE_VERSION: ${{ env.LUSOFW_FIRMWARE_VERSION }}
        run: /usr/bin/env bash build.sh build-firmware ${{ matrix.firmware }}

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.firmware }}
          path: out

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Compute release tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            LUSOFW_FIRMWARE_VERSION=$(grep '^[[:space:]]*#define[[:space:]]\+LUSOFW_FIRMWARE_VERSION[[:space:]]\+"' examples/simple_repeater/MyMesh.h | \
              sed -E 's/^[[:space:]]*#define[[:space:]]+LUSOFW_FIRMWARE_VERSION[[:space:]]+"([^"]+)".*/\1/')
            SHORT_SHA=$(git rev-parse --short HEAD)

            if [[ -z "${LUSOFW_FIRMWARE_VERSION}" ]]; then
              echo "Failed to extract LUSOFW_FIRMWARE_VERSION from examples/simple_repeater/MyMesh.h"
              exit 1
            fi

            echo "RELEASE_TAG=${LUSOFW_FIRMWARE_VERSION}-${SHORT_SHA}" >> "$GITHUB_ENV"
            echo "CHANGELOG_TAG=${LUSOFW_FIRMWARE_VERSION}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "CHANGELOG_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: out
          merge-multiple: true

      - name: Generate release notes from CHANGELOG
        shell: bash
        run: |
          set -euo pipefail
          tag="${CHANGELOG_TAG}"

          if [[ ! -f CHANGELOG.md ]]; then
            echo "CHANGELOG.md not found; using empty release notes." > release_body.md
            exit 0
          fi

          awk -v tag="$tag" '
            BEGIN { capture=0 }
            $0 ~ "^##[[:space:]]*\\[" tag "\\]" || $0 ~ "^##[[:space:]]*" tag "([[:space:]]|$)" {
              capture=1
              next
            }
            capture && $0 ~ "^##[[:space:]]" { exit }
            capture { print }
          ' CHANGELOG.md > release_body.md

          if [[ ! -s release_body.md ]]; then
            awk '
              BEGIN { capture=0 }
              /^##[[:space:]]/ {
                if (capture == 1) exit
                capture=1
                next
              }
              capture { print }
            ' CHANGELOG.md > release_body.md
          fi

      - name: Generate SHA1 checksums
        shell: bash
        run: |
          set -euo pipefail
          find out -type f ! -name '*.sha1' | while read -r f; do
            sha1sum "$f" | awk '{print $1}' > "${f}.sha1"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body_path: release_body.md
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          files: out/*

